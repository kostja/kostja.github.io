  <text x="280" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#2B2D2C">&#x041F;&#x0440;&#x0438;&#x043E;&#x0440;&#x0438;&#x0442;&#x0435;&#x0442;&#x044B; &#x043D;&#x043E;&#x0432;&#x043E;&#x0433;&#x043E; &#x043F;&#x043B;&#x0430;&#x043D;&#x0438;&#x0440;&#x043E;&#x0432;&#x0449;&#x0438;&#x043A;&#x0430;</text>

  <!-- Priority 1 -->
