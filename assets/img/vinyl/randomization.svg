<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Consolas, monospace" font-size="11">
  <!-- Title -->
  <text x="300" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Стадный эффект и рандомизация</text>

  <!-- Without randomization -->
  <text x="150" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Без рандомизации</text>

  <!-- Time axis -->
  <line x1="30" y1="170" x2="280" y2="170" stroke="#333" stroke-width="1"/>
  <text x="155" y="185" text-anchor="middle" fill="#666" font-size="10">время →</text>

  <!-- IO axis -->
  <line x1="30" y1="170" x2="30" y2="55" stroke="#333" stroke-width="1"/>
  <text x="18" y="112" fill="#666" font-size="10" transform="rotate(-90,18,112)">I/O</text>

  <!-- Spike -->
  <rect x="60" y="60" width="25" height="110" rx="2" fill="#ef5350"/>
  <text x="72" y="55" text-anchor="middle" fill="#c62828" font-size="9">дамп</text>

  <!-- All ranges compact at once -->
  <rect x="90" y="62" width="60" height="108" rx="2" fill="#e53935" opacity="0.8"/>
  <text x="120" y="55" text-anchor="middle" fill="#c62828" font-size="8">1000 слияний</text>

  <!-- Calm period -->
  <rect x="155" y="155" width="60" height="15" rx="2" fill="#a5d6a7"/>

  <!-- Next spike -->
  <rect x="220" y="60" width="25" height="110" rx="2" fill="#ef5350"/>
  <rect x="248" y="62" width="30" height="108" rx="2" fill="#e53935" opacity="0.8"/>

  <!-- Threshold line -->
  <line x1="30" y1="90" x2="280" y2="90" stroke="#c62828" stroke-width="0.8" stroke-dasharray="4"/>
  <text x="285" y="93" fill="#c62828" font-size="9">write stall</text>

  <!-- With randomization -->
  <text x="450" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">С рандомизацией (10%)</text>

  <!-- Time axis -->
  <line x1="320" y1="170" x2="580" y2="170" stroke="#333" stroke-width="1"/>
  <text x="450" y="185" text-anchor="middle" fill="#666" font-size="10">время →</text>

  <!-- IO axis -->
  <line x1="320" y1="170" x2="320" y2="55" stroke="#333" stroke-width="1"/>
  <text x="308" y="112" fill="#666" font-size="10" transform="rotate(-90,308,112)">I/O</text>

  <!-- Distributed compactions -->
  <rect x="350" y="115" width="20" height="55" rx="2" fill="#66bb6a"/>
  <text x="360" y="108" text-anchor="middle" fill="#2e7d32" font-size="8">дамп</text>

  <rect x="373" y="105" width="40" height="65" rx="2" fill="#43a047" opacity="0.7"/>
  <text x="393" y="98" text-anchor="middle" fill="#2e7d32" font-size="8">~900</text>

  <rect x="418" y="120" width="30" height="50" rx="2" fill="#66bb6a" opacity="0.6"/>

  <rect x="455" y="130" width="25" height="40" rx="2" fill="#81c784" opacity="0.5"/>
  <text x="467" y="123" text-anchor="middle" fill="#2e7d32" font-size="8">~100</text>

  <rect x="490" y="115" width="20" height="55" rx="2" fill="#66bb6a"/>
  <rect x="513" y="108" width="40" height="62" rx="2" fill="#43a047" opacity="0.7"/>

  <!-- Threshold line -->
  <line x1="320" y1="90" x2="580" y2="90" stroke="#2e7d32" stroke-width="0.8" stroke-dasharray="4"/>
  <text x="585" y="93" fill="#2e7d32" font-size="9">OK</text>

  <!-- Legend -->
  <rect x="100" y="210" width="400" height="90" rx="6" fill="#f5f5f5" stroke="#ccc"/>
  <rect x="115" y="225" width="14" height="14" rx="2" fill="#ef5350"/>
  <text x="135" y="236" fill="#333" font-size="10">дамп (сброс из памяти на диск)</text>
  <rect x="115" y="248" width="14" height="14" rx="2" fill="#e53935" opacity="0.8"/>
  <text x="135" y="259" fill="#333" font-size="10">слияния (все диапазоны сразу → I/O шторм)</text>
  <rect x="115" y="271" width="14" height="14" rx="2" fill="#81c784" opacity="0.6"/>
  <text x="135" y="282" fill="#333" font-size="10">10% диапазонов откладывают слияние → нагрузка размазана</text>
</svg>
