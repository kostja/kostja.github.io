<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="Consolas, monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
  </defs>

  <!-- L0 -->
  <rect x="160" y="10" width="200" height="36" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="260" y="33" text-anchor="middle" font-weight="bold" fill="#2e7d32">L0 (memory)</text>
  <text x="390" y="33" fill="#888" font-size="11">← INSERT {key=42}</text>

  <!-- Arrow L0 → L1 -->
  <line x1="260" y1="46" x2="260" y2="76" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="275" y="66" fill="#c62828" font-size="11">L0 full → dump</text>

  <!-- L1 -->
  <rect x="130" y="80" width="260" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="260" y="103" text-anchor="middle" font-weight="bold" fill="#1565c0">L1 (disk, ~10 MB)</text>

  <!-- Arrow L1 → L2 -->
  <line x1="260" y1="116" x2="260" y2="146" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="275" y="136" fill="#c62828" font-size="11">L1 full → merge L1+L2</text>

  <!-- L2 -->
  <rect x="100" y="150" width="320" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="260" y="173" text-anchor="middle" font-weight="bold" fill="#1565c0">L2 (disk, ~100 MB)</text>

  <!-- Arrow L2 → L3 -->
  <line x1="260" y1="186" x2="260" y2="216" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="275" y="206" fill="#c62828" font-size="11">L2 full → merge L2+L3</text>

  <!-- L3 -->
  <rect x="70" y="220" width="380" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="260" y="243" text-anchor="middle" font-weight="bold" fill="#1565c0">L3 (disk, ~1 GB)</text>

  <!-- Arrow L3 → L4 -->
  <line x1="260" y1="256" x2="260" y2="286" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="275" y="276" fill="#c62828" font-size="11">L3 full → merge L3+L4</text>

  <!-- L4 -->
  <rect x="40" y="290" width="440" height="36" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="260" y="313" text-anchor="middle" font-weight="bold" fill="#bf360c">L4 (disk, ~10 GB)</text>

  <!-- Summary -->
  <rect x="40" y="350" width="440" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="260" y="371" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">1 INSERT → каскад → перезапись до 11 GB</text>
  <text x="260" y="389" text-anchor="middle" fill="#c62828" font-size="11">(write amplification до 10 000x)</text>
</svg>
